     "Indicare il nodeid di modello dove si trovano i contatori da salvare nel database","Indicare il nodeid di modello dove si trovano i contatori da salvare nel database","Indicate the model no. where the counters to be saved in the database are located","Geben Sie die Nodeid des Modells an, wo sich die in der Datenbank zu speichernden Zähler befinden","Indiquer le nodeID du modèle où se trouvent les compteurs à enregistrer dans la base de données.","Indique el nodeid del modelo en el que se encuentran los contadores que deben guardarse en la base de datos",
     "Spazio percorso","Spazio percorso","Space travelled","Wegstrecke","Espace parcours","Espacio recorrido",
     "ProceduraSetupPist","- Spostare il braccio in posizione di setup con il relativo pulsante\n- Premere il comando manuale pistole per spruzzare sul tappeto\n- Aprire lo sportello per prendere le misure come da immagine:\n   a. Quota X da centro spruzzo a bordo cabina lato operatore\n   b. Quota Y da centro spruzzo ad inizio cabina\n","- Move the arm to the set-up position by pressing the relative button\n- Press the manual gun command to spray on the belt\n- Open the door to take the measurements as shown in the picture:\n   a. Dimension X from the centre of the spray to the edge of the booth on the operator side\n   b. Dimension Y from the centre of the spray to the start of the booth","- Bewegen Sie den Arm mit der entsprechenden Taste in die Setup-Position\n- Drücken Sie die manuelle Pistolensteuerung, um auf das Band zu sprühen\n- Öffnen Sie die Tür, um Messungen vorzunehmen, wie auf dem Bild gezeigt:\n   a. Maß X von der Mitte des Sprühstrahls bis zur Kabinenkante auf der Bedienerseite\n   b. Maß Y von der Mitte des Sprühstrahls bis zur Oberkante der Kabine","- Déplacer le bras en position de réglage à l'aide du bouton correspondant\n- Appuyer sur la commande manuelle du pistolet pour pulvériser sur le tapis\n- Ouvrir la porte pour prendre les mesures comme indiqué sur l'image :\n   a. Hauteur X du centre de pulvérisation à bord de la cabine côté opérateur\n   b. Hauteur Y du centre de la pulvérisation au début de la cabine","- Mueva el brazo a la posición de configuración con el botón correspondiente\n- Presione el mando manual de las pistolas para rociar sobre la cinta\n- Abra la puerta para tomar las medidas como se muestra en la imagen:\n   a. Medida X desde el centro de rociado hasta el borde de la cabina del lado del operador\n   b. Medida Y desde el centro de rociado hasta el inicio de la cabina",
