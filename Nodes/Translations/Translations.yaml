     "dUsrVelocLinea","Velocità linea","Line speed","Liniengeschwindigkeit","Vitesse ligne","Velocidad línea",
     "ProceduraPuliziaPistole","-  Accendere Ventilazione\n-  Chiudere mandata e aprire scarico pompa\n-  Confermare le operazioni precedenti per avviare la procedura\n-  Attendere che il braccio oscillante e il trasporto siano fermi\n-  Disattivare nebulizzazione tramite apposito comando manuale\n-  Abilitare comando pistole\n-  Rimuovere ugelli\n-  Effettuare pulizia ugelli\n-  Montare ugelli\n-  Disattivare comando pistole\n-  Ripristinare nebulizzazione tramite apposito comando manuale\n-  Disattivare selettore per completare la procedura","- Switch on Ventilation\n- Close delivery and open pump discharge\n- Confirm previous steps to start procedure\n- Wait for oscillator arm and conveyor to stop\n- Deactivate spraying by manual override\n- Enable gun control\n- Remove nozzles\n- Carry out nozzle cleaning\n- Mount nozzles\n- Deactivate gun control\n- Resume spraying by manual override\n- Deactivate selector switch to complete procedure","- Belüftung einschalten\n- Auslass schließen und Pumpenauslass öffnen\n- Bestätigen Sie die vorherigen Schritte, um den Vorgang zu starten\n- Warten Sie, bis der oszillierende Arm und der Transport zum Stillstand gekommen sind\n- Das Sprühen per Handsteuerung deaktivieren\n- Pistolensteuerung aktivieren\n- Düsen entfernen\n- Düsenreinigung durchführen\n- Düsen montieren\n- Pistolensteuerung deaktivieren\n- Wiederaufnahme des Spritzens durch manuelle Überbrückung\n- Deaktivieren Sie den Wahlschalter, um den Vorgang abzuschließen","-  Activer ventilation\n-  Fermer refoulement et ouvrir déchargement pompe\n-  Confirmer les opérations précédentes pour lancer la procédure\n-  Attendre que le bras pivotant et le convoyeur s'arrêtent\n-  Désactiver la pulvérisation au moyen de la commande manuelle\n-  Activer commande pistolets\n-  Retirer buses\n-  Effectuer  nettoyage des buses\n-  Monter buses\n-  Désactiver commande des pistolets\n-  Reprendre la pulvérisation au moyen de la commande manuelle\n-  Désactiver le sélecteur pour terminer la procédure","- Conectar la ventilación\n- Cerrar la descarga y abrir la descarga de la bomba\n- Confirmar los pasos anteriores para iniciar el procedimiento\n- Esperar a que se detengan el brazo oscilante y el transporte\n- Desactivar la pulverización con el mando manual\n- Activar el control de la pistola\n- Retirar las boquillas\n- Realizar la limpieza de boquillas\n- Montar boquillas\n- Desactivar el mando de la pistola\n- Reanudar la pulverización mediante mando manual\n- Desactivar el selector para finalizar el procedimiento",
     "ProceduraBarattolo","Nota: \n   Se necessario cambiare colore nel serbatoio si dovrà ripetere questa\n   procedura 2 volte intervallando le procedure di spurgo e carico prodotto:\n  1. Eseguire procedura cambio barattolo per rimuovere il serbatoio con il \n   vecchio colore ed installare il serbatoio con il prodotto di lavaggio;\n  2. Eseguire procedura spurgo;\n  3. Eseguire procedura cambio barattolo per rimuovere il serbatoio con il\n   prodotto di lavaggio ed installare il serbatoio con il nuovo colore;\n  4. Eseguire procedura di carico colore;\n\n-  Togliere pressione nebulizzazione tramite apposito comando manuale\n-  Aprire lo sportello della macchina\n-  Installare/disinstallare il serbatoio\n-  Richiudere lo sportello della macchina\n-  Ripristinare nebulizzazione tramite apposito comando manuale\n-  Disattivare selettore per completare la procedura","Note: \n   If the colour in the tank needs to be changed, repeat this\n   procedure twice in between purging and product filling procedures:\n  1. Carry out can change procedure to remove the tank with the \n   old colour and install the tank with the washing product;\n  2. Perform purge procedure;\n  3. Carry out can change procedure to remove the tank with the\n   washing product and install the tank with the new colour;\n  4. Execute colour filling procedure;\n\n- Remove spraying pressure by manual override\n- Open machine door\n- Install/uninstall tank\n- Close machine door\n- Resume spraying pressure via manual override\n- Deactivate selector switch to complete procedure","Hinweis: \n  Wenn es notwendig ist, die Farbe im Tank zu ändern, sollten Sie diesen \n  Vorgang 2-Mal zwischen dem Spülen und dem Einfüllen des Produkts wiederholen:\n  1. Führen Sie den Wechselvorgang durch, um den Tank mit der alten Farbe zu \n  entfernen und den Tank mit dem Spülprodukt zu installieren;\n  2. Führen Sie die Spülung durch;\n  3. Führen Sie einen Dosenwechsel durch, um den Tank mit dem Spülmittel zu \n  entfernen und den Tank mit der neuen Farbe zu installieren;\n  4. Führen Sie das Verfahren zum Laden der Farbe durch;\n\n- Entfernen Sie den Sprühdruck mit der Handsteuerung\n- Maschinentür öffnen\n- Behälter ein-/ausbauen\n- Maschinentür schließen\n- Wiederaufnahme des Sprühdrucks über die manuelle Übersteuerung\n- Deaktivieren Sie den Wahlschalter, um den Vorgang abzuschließen","Remarque : \n   S’il est nécessaire changer de couleur dans le réservoir, il faudra répéter cette\n   procédure 2 fois en alternant les procédures de purge et de chargement du produit :\n  1. Effectuer la procédure de changement du pot pour retirer le réservoir avec la\n   vieille couleur et installer le réservoir avec le produit de lavage ;\n  2. Effectuer la procédure de purge ;\n  3. Effectuer procédure changement de pot pour retirer le réservoir avec le\n   produit de lavage et installer le réservoir avec la nouvelle couleur ;\n  4. Effectuer procédure de chargement couleur ;\n\n-  Supprimer la pression de pulvérisation à l'aide de la commande manuelle\n-  Ouvrir la porte de la machine\n-  Installer/désinstaller le réservoir\n-  Refermer la porte de la machine\n-  Rétablir pulvérisation au moyen de la commande manuelle\n-  Désactiver sélecteur pour terminer la procédure","Nota: \n  Si es necesario cambiar el color del tanque, este procedimiento debe \n  repetirse 2 veces entre los procedimientos de purga y carga de producto:\n  1. Realice el procedimiento de cambio de lata para retirar el depósito\n  con el color antiguo e instalar el depósito con el producto de lavado;  \n  2. Realizar procedimiento de purga;\n  3. Realice el procedimiento de cambio de lata para retirar el depósito\n  con el producto de lavado e instalar el depósito con el nuevo color;\n  4. Realice el procedimiento de carga de color;\n\n- Eliminar la presión de pulverización mediante el mando manual\n- Abrir la puerta de la máquina\n- Instalar/desinstalar el depósito\n- Cerrar la puerta de la máquina\n- Reanudar la presión de pulverización mediante mando manual\n- Desactivar el selector para finalizar el procedimiento",
     "ProceduraRiempimentoCirc","-  Accendere Ventilazione\n-  Mettere il pescante pompa nel serbatoio del prodotto desiderato\n-  Impostare il tempo di carico del circuito attivo\n-  Confermare le operazioni precedenti per avviare la procedura\n-  Attendere che il braccio oscillante e il trasporto siano fermi\n-  Disattivare selettore per completare la procedura ","- Switch on Ventilation\n- Place the syphon in the tank of the desired product\n- Set the filling time of the active circuit\n- Confirm previous steps to start procedure\n- Wait for oscillator arm and conveyor to stop\n- Deactivate selector switch to complete procedure","- Belüftung einschalten\n- Setzen Sie den Sauger der Pumpe in den Tank mit dem gewünschten Produkt\n- Stellen Sie die Ladezeit des aktiven Kreislaufs ein\n- Bestätigen Sie die vorherigen Schritte, um den Vorgang zu starten\n- Warten Sie, bis der oszillierende Arm und der Transport zum Stillstand gekommen sind\n- Deaktivieren Sie den Wahlschalter, um den Vorgang abzuschließen","-  Allumer ventilation\n-  Mettre le flotteur pompe dans le réservoir du produit désiré\n-  Régler le temps de chargement du circuit actif\n-  Confirmer les opérations précédentes pour lancer la procédure\n-  Attendre que le bras pivotant et le convoyeur soient arrêtés\n-  Désactiver sélecteur pour terminer la procédure","- Conectar la ventilación\n- Colocar la aspiración de la bomba en el depósito del producto deseado\n- Ajustar el tiempo de carga del circuito activo\n- Confirmar los pasos anteriores para iniciar el procedimiento\n- Esperar a que el brazo oscilante y el transporte se detengan\n- Desactivar el selector para finalizar el procedimiento",
     "ProceduraCambioPiastra","-  Accendere Ventilazione\n-  Chiudere mandata e aprire scarico pompa\n-  Confermare le operazioni precedenti per avviare la procedura\n-  Attendere che il braccio oscillante e il trasporto siano fermi\n-  Disattivare nebulizzazione tramite apposito comando manuale\n-  Aprire lo sportello e procedere con il cambio piastra con la chiave a settori\n-  Confermare ricetta piastra e selezionare numero circuito tramite apposito pulsante\n-  Ripristinare nebulizzazione tramite apposito comando manuale\n-  Disattivare selettore per completare la procedura","- Switch on Ventilation\n- Close delivery and open pump discharge\n- Confirm previous steps to start procedure\n- Wait for oscillator arm and conveyor to stop\n- Deactivate spraying by manual override\n- Open the door and proceed with plate change with the sector key\n- Confirm plate recipe and select circuit number using corresponding button\n- Resume spraying by manual override\n- Deactivate selector switch to complete procedure","- Belüftung einschalten\n- Auslass schließen und Pumpenauslass öffnen\n- Bestätigen Sie die vorherigen Schritte, um den Vorgang zu starten\n- Warten Sie, bis der oszillierende Arm und der Transport zum Stillstand gekommen sind\n- Deaktivieren Sie das Sprühen mit der Handsteuerung\n- Öffnen Sie die Tür und führen Sie den Plattenwechsel mit dem Sektorschlüssel durch\n- Bestätigen Sie das Plattenrezept und wählen Sie die Kreislaufnummer mit der entsprechenden Taste\n- Wiederaufnahme des Sprühdrucks über die manuelle Übersteuerung\n- Deaktivieren Sie den Wahlschalter, um den Vorgang abzuschließen","-  Allumer ventilation\n-  Fermer refoulement et ouvrir déchargement pompe\n-  Confirmer les opérations précédentes pour lancer la procédure\n-  Attendre que le bras pivotant et le convoyeur soient arrêtés\n-  Désactiver la pulvérisation au moyen de la commande manuelle\n-  Ouvrir la porte et procéder au changement de plaque avec la clé à secteurs\n-  Confirmer recette plaque et sélectionner numéro circuit au moyen du bouton prévu à cet effet\n-  Rétablir pulvérisation au moyen de la commande manuelle\n-  Désactiver sélecteur pour terminer la procédure","- Conectar la ventilación\n- Cerrar la descarga y abrir la descarga de la bomba\n- Confirmar los pasos anteriores para iniciar el procedimiento\n- Esperar a que se detengan el brazo oscilante y el transporte\n- Desactivar la pulverización con el mando manual\n- Abrir la puerta y proceder al cambio de plancha con la llave de sector\n- Confirmar la receta de la placa y seleccionar el número de circuito con el botón correspondiente\n- Reanudar la pulverización mediante mando manual\n- Desactivar el selector para finalizar el procedimiento",
     "ProceduraSpurgoCirc","-  Accendere Ventilazione\n-  Mettere il pescante pompa nel serbatoio con il prodotto di lavaggio\n-  Impostare il tempo di spurgo del circuito attivo\n-  Confermare le operazioni precedenti per avviare la procedura\n-  Attendere che il braccio oscillante e il trasporto siano fermi\n-  Disattivare selettore per completare la procedura","- Switch on Ventilation\n- Put syphon in the tank with the flushing agent\n- Set the purge time for the active circuit\n- Confirm previous steps to start procedure\n- Wait for oscillator arm and conveyor to stop\n- Switch off selector to complete procedure","- Belüftung einschalten\n- Setzen Sie die Pumpenansaugung in den Tank mit dem Spülmittel\n- Stellen Sie die Zeit für die Spülung des aktiven Kreislaufs ein\n- Bestätigen Sie die vorherigen Schritte, um den Vorgang zu starten\n- Warten Sie, bis der oszillierende Arm und der Transport zum Stillstand gekommen sind\n- Deaktivieren Sie den Wahlschalter, um den Vorgang abzuschließen","-  Allumer ventilation\n-  Mettre le flotteur pompe dans le réservoir avec le produit de lavage\n-  Régler le temps de purge du circuit actif\n-  Confirmer les opérations précédentes pour lancer la procédure\n-  Attendre que le bras pivotant et le convoyeur soient arrêtés\n-  Désactiver sélecteur pour terminer la procédure","- Conectar la ventilación\n- Introducir la aspiración de la bomba en el depósito con el agente de purga\n- Ajustar el tiempo de purga del circuito activo\n- Confirmar los pasos anteriores para iniciar el procedimiento\n- Esperar a que se detengan el brazo oscilante y el transporte\n- Desconectar el selector para finalizar el procedimiento",
     "Procedura Cambio Piastra / Circuito","Procedura Cambio Piastra / Circuito","Plate / Circuit Change Procedure","Verfahren zum Wechseln der Platte / des Kreislaufs","Procédure changement Plaque / Circuit","Procedimiento de cambio de plancha / Circuito",
     "Procedura Cambio Barattolo","Procedura Cambio Barattolo","Can Change Procedure","Verfahren zum Wechseln der Dose","Procédure changement pot","Procedimiento cambio frasco",
     "Procedura Pulizia Pistole","Procedura Pulizia Pistole","Gun Cleaning Procedure","Reinigung der Pistole","Procédure nettoyage pistolets","Procedimiento limpieza pistola",
     "Procedura Riempimento Circuito","Procedura Riempimento Circuito","Circuit Filling Procedure","Verfahren zum Füllen des Kreislaufs","Procédure remplissage circuit","Procedimiento llenado circuito",
     "Procedura Spurgo Circuito","Procedura Spurgo Circuito","Circuit Purge Procedure","Verfahren zum Entlüften des Kreislaufs","Procédure purge circuit","Procedimiento purga circuito",
     "ProceduraCambioCartaIN","-  Accendere Ventilazione\n-  Sostituire rotolo carta ingresso\n-  Fissare la carta in ingresso al tappeto con nastro carta\n-  Premere pulsante manuale tappeto in uscita alla carta\n-  Togliere il nastro carta\n-  Premere pulsante manuale tappeto per portare la carta al rotolo di recupero.\n-  Disattivare l’aspirazione tappeto\n-  Fissare la carta al rotolo di recupero\n-  Attivare l’aspirazione tappeto\n-  Disattivare il selettore per terminare la procedura","-  Switch on Ventilation\n-  Replace input paper roll\n-  Fasten input paper to the belt with paper tape\n-  Press manual belt button on paper output.\n-  Remove paper tape\n-  Press manual belt button to take the paper to the retrieval roll.\n- Deactivate belt aspiration\n- Fasten paper to retrieval roll\n- Activate belt aspiration\n- Deactivate selector switch to end procedure","- Belüftung einschalten\n- Einzugspapierrolle austauschen\n- Befestigen Sie das Papier am Eingang zum Bandeinzug mit Papierband\n- Drücken Sie die Taste für die manuelle Papierausgabe\n- Entfernen Sie das Papierband\n- Drücken Sie die Taste für den manuellen Bandeinzug, um das Papier zur Rückgewinnungsrolle zu bringen.\n- Deaktivieren Sie den Bandeinzug\n- Befestigen Sie das Papier an der Aufnahmerolle\n- Aktivieren Sie den Bandeinzug\n- Deaktivieren Sie den Wahlschalter, um den Vorgang abzuschließen","-  Allumer ventilation\n-  Remplacer rouleau papier entrée\n-  Fixer le papier à l'entrée du tapis avec bande papier\n-  Appuyer sur bouton manuel tapis à la sortie du papier\n-  Retirer la bande papier\n-  Appuyer sur le bouton manuel tapis pour amener le papier au rouleau de récupération.\n-  Désactiver l'aspiration tapis\n-  Fixer le papier au rouleau de récupération\n-  Activer l'aspiration tapis\n-  Désactiver le sélecteur pour terminer la procédure","- Conectar la ventilación\n- Sustituir el rollo de papel de entrada\n- Fijar la entrada de papel a la cinta con cinta de papel\n- Pulsar el botón de salida manual de papel\n- Retirar la cinta de papel\n- Pulsar el botón de alfombra manual para llevar el papel al rollo de papel.\n- Desactivar la aspiración de la cinta\n- Fijar el papel al rollo de recuperación\n- Activar la aspiración de la cinta\n- Desactivar el selector para finalizar el procedimiento",
     "ProceduraCambioCartaOUT","-  Accendere Ventilazione\n-  Tagliare la carta in uscita dal trasporto\n-  Sostituire rotolo recupero\n-  Premere pulsante manuale tappeto per portare la carta al rotolo di recupero.\n-  Disattivare l’aspirazione tappeto\n-  Fissare la carta al rotolo di recupero\n-  Attivare l’aspirazione tappeto\n-  Disattivare il selettore per terminare la procedura","-  Switch on Ventilation\n-  Cut paper leaving conveyor\n-  Replace retrieval roll\n-  Press manual belt button to take the paper to the retrieval roll.\n- Deactivate belt aspiration\n- Fasten paper to retrieval roll\n- Activate belt aspiration\n- Deactivate selector switch to end procedure","- Belüftung einschalten\n- Schneiden Sie das aus dem Transport kommende Papier ab\n- Aufwickelrolle austauschen\n- Drücken Sie die Taste für den manuellen Bandeinzug, um das Papier zur Rückgewinnungsrolle zu bringen.\n- Deaktivieren Sie den Bandeinzug\n- Befestigen Sie das Papier an der Aufnahmerolle\n- Aktivieren Sie den Bandeinzug\n- Deaktivieren Sie den Wahlschalter, um den Vorgang abzuschließen","-  Allumer ventilation\n-  Couper le papier à la sortie du convoyeur\n-  Remplacer rouleau récupération\n-  Appuyer sur le bouton manuel tapis pour amener le papier au rouleau de récupération.\n-  Désactiver l'aspiration tapis\n-  Fixer le papier au rouleau de récupération\n-  Activer l'aspiration tapis\n-  Désactiver le sélecteur pour terminer la procédure","- Encender la ventilación\n- Cortar el papel que sale del transporte\n- Sustituir el rollo de recuperación\n- Pulsar el botón de alfombra manual para llevar el papel al rollo de recuperación.\n- Desactivar la aspiración de la cinta\n- Fijar el papel al rollo de recuperación\n- Activar la aspiración de la cinta\n- Desactivar el selector para finalizar el procedimiento",
