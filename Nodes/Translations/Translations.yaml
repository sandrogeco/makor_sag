     "ProceduraPuliziaPistole","-  Accendere Ventilazione\n-  Chiudere mandata e aprire scarico pompa\n-  Confermare le operazioni precedenti per avviare la procedura\n-  Attendere che il braccio oscillante e il trasporto siano fermi\n-  Disattivare nebulizzazione tramite apposito comando manuale\n-  Abilitare comando pistole\n-  Rimuovere ugelli\n-  Effettuare pulizia ugelli\n-  Montare ugelli\n-  Disattivare comando pistole\n-  Ripristinare nebulizzazione tramite apposito comando manuale\n-  Disattivare selettore per completare la procedura","","","","",
     "ProceduraBarattolo","Nota: \n   Se necessario cambiare colore nel serbatoio si dovrà ripetere questa\n   procedura 2 volte intervallando le procedure di spurgo e carico prodotto:\n\t\t1.\tEseguire procedura cambio barattolo per rimuovere il serbatoio con il \n\t\t\tvecchio colore ed installare il serbatoio con il prodotto di lavaggio;\n\t\t2.\tEseguire procedura spurgo;\n\t\t3.\tEseguire procedura cambio barattolo per rimuovere il serbatoio con il\n\t\t\tprodotto di lavaggio ed installare il serbatoio con il nuovo colore;\n\t\t4.\tEseguire procedura di carico colore;\n\n-  Togliere pressione nebulizzazione tramite apposito comando manuale\n-  Aprire lo sportello della macchina\n-  Installare/disinstallare il serbatoio\n-  Richiudere lo sportello della macchina\n-  Ripristinare nebulizzazione tramite apposito comando manuale\n-  Disattivare selettore per completare la procedura","","","","",
     "ProceduraRiempimentoCirc","-  Accendere Ventilazione\n-  Mettere il pescante pompa nel serbatoio del prodotto desiderato\n-  Impostare il tempo di carico del circuito attivo\n-  Confermare le operazioni precedenti per avviare la procedura\n-  Attendere che il braccio oscillante e il trasporto siano fermi\n-  Disattivare selettore per completare la procedura","","","","",
     "ProceduraCambioPiastra","-  Accendere Ventilazione\n-  Chiudere mandata e aprire scarico pompa\n-  Confermare le operazioni precedenti per avviare la procedura\n-  Attendere che il braccio oscillante e il trasporto siano fermi\n-  Disattivare nebulizzazione tramite apposito comando manuale\n-  Aprire lo sportello e procedere con il cambio piastra con la chiave a settori\n-  Confermare ricetta piastra e selezionare numero circuito tramite apposito pulsante\n-  Ripristinare nebulizzazione tramite apposito comando manuale\n-  Disattivare selettore per completare la procedura","","","","",
     "ProceduraSpurgoCirc","-  Accendere Ventilazione\n-  Mettere il pescante pompa nel serbatoio con il prodotto di lavaggio\n-  Impostare il tempo di spurgo del circuito attivo\n-  Confermare le operazioni precedenti per avviare la procedura\n-  Attendere che il braccio oscillante e il trasporto siano fermi\n-  Disattivare selettore per completare la procedura","","","","",
     "Procedura Cambio Piastra / Circuito","Procedura Cambio Piastra / Circuito","","","","",
     "Procedura Cambio Barattolo","Procedura Cambio Barattolo","","","","",
     "Procedura Pulizia Pistole","Procedura Pulizia Pistole","","","","",
     "Procedura Riempimento Circuito","Procedura Riempimento Circuito","","","","",
     "Procedura Spurgo Circuito","Procedura Spurgo Circuito","","","","",
     "ProceduraCambioCartaIN","-  Accendere Ventilazione\n-  Sostituire rotolo carta ingresso\n-  Fissare la carta in ingresso al tappeto con nastro carta\n-  Premere pulsante manuale tappeto in uscita alla carta\n-  Togliere il nastro carta\n-  Premere pulsante manuale tappeto per portare la carta al rotolo di recupero.\n-  Disattivare l’aspirazione tappeto\n-  Fissare la carta al rotolo di recupero\n-  Attivare l’aspirazione tappeto\n-  Disattivare il selettore per terminare la procedura","","","","",
     "ProceduraCambioCartaOUT","-  Accendere Ventilazione\n-  Tagliare la carta in uscita dal trasporto\n-  Sostituire rotolo recupero\n-  Premere pulsante manuale tappeto per portare la carta al rotolo di recupero.\n-  Disattivare l’aspirazione tappeto\n-  Fissare la carta al rotolo di recupero\n-  Attivare l’aspirazione tappeto\n-  Disattivare il selettore per terminare la procedura","","","","",
